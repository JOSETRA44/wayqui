publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  provider: ^6.1.2
  go_router: ^14.6.3
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0
  flutter_dotenv: ^5.2.1
