name: wayqui
description: "Wayqui — Gestión de préstamos personales para el mercado peruano."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # ── Backend ───────────────────────────────────────────────────
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1

  # ── State Management (Riverpod — elegido sobre BLoC/Provider)
  # Justificación: AsyncValue nativo, auto-dispose, sin BuildContext,
  # integración perfecta con streams de Supabase Realtime.
  flutter_riverpod: ^2.6.1

  # ── Routing ───────────────────────────────────────────────────
  go_router: ^14.6.3

  # ── Seguridad ─────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2   # tokens en Keychain/Keystore
  crypto: ^3.0.5                   # SHA-256 checksums para integridad

  # ── UI & Design System ────────────────────────────────────────
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0          # animaciones 60/120 FPS
  cupertino_icons: ^1.0.8

  # ── Lógica de negocio ─────────────────────────────────────────
  url_launcher: ^6.3.1             # deep links Yape / Plin
  intl: ^0.19.0                    # formato PEN (S/. 1,234.50)
  image_picker: ^1.1.2             # comprobantes de pago

  # ── Caché ─────────────────────────────────────────────────────
  file_cache_flutter: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  http: ^1.2.2          # RLS penetration tests

flutter:
  uses-material-design: true

  assets:
    - .env
